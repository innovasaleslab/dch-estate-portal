function dianeWriteup(){return`<p>Diane Catherine Harris was a woman of deep Catholic faith, intellectual conviction, and extraordinary generosity. Born and raised in the Catholic tradition, Diane devoted her life to the proposition that the ancient faith, properly understood and faithfully practiced, is the source of all genuine human flourishing. Her personal library, her correspondence, and her financial giving over decades all bore witness to a single animating conviction: that the Church, in her fullness, holds the answer to every question the modern world mistakes for having already answered.</p>
<p>Diane had little patience for dilution. She supported organizations that held the line &mdash; on doctrine, on liturgy, on human life from conception to natural death, on the family as the irreplaceable cell of civilization. She believed in the Latin Mass, in faithful catechesis, in the formation of priests who would preach without apology, and in the education of young people in the full inheritance of Western Christendom. Her giving reflected this: she gave to seminaries, to colleges, to pro-life legal advocates, to missionaries, and to religious sisters and brothers who had consecrated their lives entirely to God.</p>
<p>She was also a woman of quiet personal generosity &mdash; loyal to her friends, constant in her prayer, and deeply devoted to the souls of those who had gone before her. She requested, and we earnestly ask of you, that Masses and prayers be offered for the repose of her soul, trusting in the communion of saints and the mercy of God.</p>
<p>This gift is offered in her memory, and in fidelity to what she stood for. We ask that you be good stewards of it.</p>`;}
